name: CI
on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  test:
    name: Test - ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "pypy-3.11"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true
          cache: 'pip'
      - name: Install dependencies
        run: python -m pip install tox
      - name: Run tests
        run: |
          python -m tox -e py
          python -m tox -e noextra
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
          check-latest: true
          cache: 'pip'
      - name: Install dependencies
        run: python -m pip install tox
      - name: Run linting
        run: python -m tox -e pep8 -e ruff
      - name: Run mypy
        run: python -m tox -e mypy
  packaging:
    name: Packaging
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
          check-latest: true
          cache: 'pip'
      - name: Install dependencies
        run: python -m pip install tox
      - name: Test packaging
        run: python -m tox -e packaging
